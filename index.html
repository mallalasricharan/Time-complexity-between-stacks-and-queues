<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack vs Queue Performance Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#60a5fa;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:90px;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    margin-bottom:15px;
}

.button-group{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    background:#3b82f6;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.clear-btn{
    background:#ef4444;
}

.clear-btn:hover{
    background:#dc2626;
}

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.card{
    background:#334155;
    padding:20px;
    border-radius:12px;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-left:5px solid #22c55e;
}

@media(max-width:768px){
    .cards{grid-template-columns:1fr;}
    .button-group{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

<h1>Stack vs Queue Performance Analyzer</h1>
<p class="subtitle">Time Complexity Comparison Tool</p>

<textarea id="input" placeholder="Example: 10, 20, 30, 40"></textarea>

<div class="button-group">
<button onclick="analyze()">Analyze</button>
<button onclick="clearData()" class="clear-btn">Clear</button>
</div>

<div class="cards">

<div class="card">
<h2>Stack</h2>
<p>Time: <span id="stackTime">-</span></p>
</div>

<div class="card">
<h2>Queue</h2>
<p>Time: <span id="queueTime">-</span></p>
</div>

</div>

<div class="result">
<h3 id="winner">Result</h3>
<p id="reason"></p>
</div>

<div class="result">
<h3>Time Complexity</h3>
<p id="stackComplexity">Stack: -</p>
<p id="queueComplexity">Queue: -</p>
</div>

</div>

<script>

// INPUT
function getInputArray() {
    let input = document.getElementById("input").value;

    if (!input || input.trim() === "") {
        alert("Please enter numbers!");
        return null;
    }

    let arr = input.split(",").map(num => Number(num.trim()));

    if (arr.some(isNaN)) {
        alert("Invalid numbers!");
        return null;
    }

    return arr;
}

// STACK
function runStack(arr) {
    let stack = [];

    for (let i = 0; i < arr.length; i++) {
        stack.push(arr[i]);
    }

    while (stack.length > 0) {
        stack.pop();
    }
}

// QUEUE
class Queue {
    constructor() {
        this.arr = [];
        this.front = 0;
    }

    enqueue(x) {
        this.arr.push(x);
    }

    dequeue() {
        return this.arr[this.front++];
    }

    size() {
        return this.arr.length - this.front;
    }
}

function runQueue(arr) {
    let q = new Queue();

    for (let i = 0; i < arr.length; i++) {
        q.enqueue(arr[i]);
    }

    while (q.size() > 0) {
        q.dequeue();
    }
}

// ANALYZE
function analyze() {

    let input = getInputArray();
    if (!input) return;

    let testArray = [];

    for (let i = 0; i < 20; i++) {
        testArray = testArray.concat(input);
    }

    let iterations = 100;

    let stackTotal = 0;
    let queueTotal = 0;

    let start, end;

    // STACK
    for (let i = 0; i < iterations; i++) {
        let arrCopy = [...testArray];

        start = performance.now();
        runStack(arrCopy);
        end = performance.now();

        stackTotal += (end - start);
    }

    // QUEUE
    for (let i = 0; i < iterations; i++) {
        let arrCopy = [...testArray];

        start = performance.now();
        runQueue(arrCopy);
        end = performance.now();

        queueTotal += (end - start);
    }

    let stackTime = stackTotal / iterations;
    let queueTime = queueTotal / iterations;

    document.getElementById("stackTime").innerText =
        stackTime.toFixed(6) + " ms";

    document.getElementById("queueTime").innerText =
        queueTime.toFixed(6) + " ms";

    let winner =
        stackTime < queueTime ? "Stack is Faster" : "Queue is Faster";

    document.getElementById("winner").innerText = winner;

    document.getElementById("reason").innerText =
        "Both Stack and Queue are O(1) per operation. Differences come from JavaScript engine memory behavior.";

    // TIME COMPLEXITY DISPLAY
    document.getElementById("stackComplexity").innerText =
        "Stack: O(n)";

    document.getElementById("queueComplexity").innerText =
        "Queue: O(n)";
}

// CLEAR
function clearData() {
    document.getElementById("input").value = "";
    document.getElementById("stackTime").innerText = "-";
    document.getElementById("queueTime").innerText = "-";
    document.getElementById("winner").innerText = "Result";
    document.getElementById("reason").innerText = "";
    document.getElementById("stackComplexity").innerText = "Stack: -";
    document.getElementById("queueComplexity").innerText = "Queue: -";
}

</script>

</body>
</html>
